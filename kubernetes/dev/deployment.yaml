apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: myapp
        imagePullPolicy: Never

        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service

metadata:
  name: myapp-service
  namespace: dev

spec:
  type: NodePort

  selector:
    app: myapp

  ports:
  - port: 3000
    targetPort: 3000